      if (view === "w2") return <W2Screen mode={mode} />;

      // Home and W1 each have distinct current vs proposed states.
      if (view === "home") return mode === "proposed" ? <HomeProposed go={go} /> : <HomeCurrent />;
      if (view === "w1")   return mode === "proposed" ? <W1Proposed active={w1Active} setActive={setW1Active} /> : <W1Current />;
      return null;
    }

    /* ============================================================
       APP
       ============================================================ */
    /* ============================================================
       TOUR OVERLAY, spotlight + tooltip that drives the app between
       screens. Mounted at App level so it escapes per-screen stacking
       contexts. Positions everything from getBoundingClientRect().
       ============================================================ */
    function TourOverlay({ steps, step, setStep, view, setView, setW1Active, setNwActive, onEnd }) {
      const [rect, setRect] = useState(null);
      // Glide between steps, but track scroll/resize instantly (no lag).
      const [glide, setGlide] = useState(true);
      const s = steps[step];
      const last = steps.length - 1;
      const reduce = typeof window !== "undefined" &&
        window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      // Navigate to this step's screen, then poll (setTimeout, not rAF, so it
      // also runs in a hidden/headless tab) until the target exists and its
      // rect stops moving as screenEnter settles. Cap guarantees resolution.
      useEffect(() => {
        if (s.w1 !== undefined) setW1Active(s.w1);
        if (s.nw !== undefined) setNwActive(s.nw);
        if (s.view && s.view !== view) setView(s.view);

        let t, tries = 0, lastRect = null, scrolled = false, clicked = false, cancelled = false;
        const tick = () => {
          if (cancelled) return;
          // Some steps must flip an in-screen control first (e.g. switch the
          // PulseBoard sub-tab) so the spotlight target renders. The control is
          // always present, so click it once on entry; re-asserted each step so
          // Back navigation restores the right tab.
          if (s.click && !clicked) {
            const cb = document.querySelector('[data-tour="' + s.click + '"]');
            if (cb) { cb.click(); clicked = true; }
          }
          const el = document.querySelector('[data-tour="' + s.target + '"]');
          if (el) {
            if (!scrolled) {
              // Tall targets (e.g. the full brief) won't fit: align their TOP
              // so the start of the card is framed, rather than centering off-screen.
              const tall = el.getBoundingClientRect().height > window.innerHeight - 120;
              try { el.scrollIntoView({ block: tall ? "start" : "center", behavior: "auto" }); } catch (e) {}
              scrolled = true;
            }
            const r = el.getBoundingClientRect();
            const stable = lastRect &&
              Math.abs(r.top - lastRect.top) < 0.5 &&
              Math.abs(r.left - lastRect.left) < 0.5 &&
              Math.abs(r.height - lastRect.height) < 0.5;
            lastRect = r;
            if (stable || tries > 40) { setGlide(true); setRect(r); return; }
          }
          tries++;
          t = setTimeout(tick, 16);
        };
        t = setTimeout(tick, 0);
        return () => { cancelled = true; clearTimeout(t); };
      }, [step]);

      // Esc to exit; keep the spotlight glued to its target as the user
      // scrolls (to reach content the brief cut off) or resizes. Scroll
      // doesn't bubble, so listen in the capture phase to catch the inner
      // overflow container. These updates skip the glide so there's no lag.
      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") onEnd(); };
        const reposition = () => {
          const el = document.querySelector('[data-tour="' + s.target + '"]');
          if (el) { setGlide(false); setRect(el.getBoundingClientRect()); }
        };
        window.addEventListener("keydown", onKey);
        window.addEventListener("resize", reposition);
        document.addEventListener("scroll", reposition, true);
        return () => {
          window.removeEventListener("keydown", onKey);
          window.removeEventListener("resize", reposition);
          document.removeEventListener("scroll", reposition, true);
        };
      }, [step, onEnd]);

      // Before first measure, just hold a plain dim so nothing flashes.
      if (!rect) return <div style={{ position: "fixed", inset: 0, zIndex: 49, background: "rgba(36,28,20,0.55)", pointerEvents: "none" }} />;

      const PAD = 8, cardW = 320, cardH = 176;
      const vw = window.innerWidth, vh = window.innerHeight;
      const place = s.placement || "below";
      // A target taller than the viewport fills the screen; any inline card
      // overlaps it, so pin to the bottom-right corner, clear of the framed top.
      const tall = rect.height > vh - 120;
      let top, left;
      if (tall) {
        left = vw - cardW - 16; top = vh - cardH - 16;
      } else if (place === "right") {
        left = rect.right + 12; top = rect.top;
        if (left + cardW > vw - 16) left = rect.left - cardW - 12; // flip if no room
      } else if (place === "top") {
        left = rect.left; top = rect.top - cardH - 12;
      } else {
        left = rect.left; top = rect.bottom + 12;
      }
      left = Math.min(Math.max(left, 16), vw - cardW - 16);
      top = Math.min(Math.max(top, 16), vh - cardH - 16);

      // Clamp the cut-out to the visible content area: a tall target scrolled
      // up shouldn't light the header above it, and one scrolled down shouldn't
      // claim space past the fold. The hole frames only what's actually on screen.
      // Targets OUTSIDE the scroller (header buttons, sidebar nav) live above the
      // content top by design, so they skip the top clamp — otherwise the hole
      // would slide down off them.
      const scroller = document.querySelector('main > div.overflow-y-auto');
      const targetEl = document.querySelector('[data-tour="' + s.target + '"]');
      const inScroller = !!(scroller && targetEl && scroller.contains(targetEl));
      const contentTop = inScroller ? Math.max(0, scroller.getBoundingClientRect().top) : 0;
      const spotLeft = rect.left - PAD;
      const spotTop = Math.max(rect.top - PAD, contentTop);
      const spotW = rect.width + PAD * 2;
      const spotH = Math.max(0, Math.min(rect.bottom + PAD, vh) - spotTop);

      return (
        <React.Fragment>
          {/* spotlight: the box-shadow spread dims everything but the cut-out.
              pointer-events:none so the user can still scroll the page under it. */}
          <div style={{
            position: "fixed",
            left: spotLeft, top: spotTop,
            width: spotW, height: spotH,
            borderRadius: 12, pointerEvents: "none",
            boxShadow: "0 0 0 9999px rgba(36,28,20,0.55)",
            outline: "2px solid #5E6B3F", outlineOffset: 2,
            transition: (glide && !reduce) ? "all 260ms var(--ease-out)" : "none",
            zIndex: 50,
          }} />
          {/* tooltip card */}
          <div style={{ position: "fixed", top, left, width: cardW, zIndex: 51 }}
               className="rounded-xl border hairline bg-cream deckle px-4 py-3 shadow-lg">
            <Eyebrow>{(step + 1) + " of " + steps.length}</Eyebrow>
            <div className="mt-1 font-display text-[16px] leading-tight text-ink">{s.title}</div>
            <p className="mt-1.5 text-[13px] leading-snug text-ink-2">{s.body}</p>
            <div className="mt-3 flex items-center justify-between">
              <button onClick={onEnd} className="press text-[12px] text-ink-3 hover:text-ink-2">Skip</button>
              <div className="flex items-center gap-2">
                <button onClick={() => setStep(step - 1)} disabled={step === 0}
                  className={"press rounded-full border hairline px-3 py-1 text-[12px] " + (step === 0 ? "text-ink-3 opacity-40" : "text-ink-2")}>Back</button>
                <button onClick={() => step < last ? setStep(step + 1) : onEnd()}
                  className="press rounded-full bg-olive px-3.5 py-1 text-[12px] font-medium text-cream">{step < last ? "Next" : "Done"}</button>
              </div>
            </div>
          </div>
        </React.Fragment>
      );
    }

    // Module-level so the demo ticket number advances across opens without persistence.
    let TICKET_SEQ = 4820;

    /* ============================================================
       SUPPORT TICKET, global PulseBoard action. The old board's

    // STORE: the slide-over of everything the agent has learned from this AM,
    // split into per-buyer facts and the AM's own writing voice.
    function MemoryPanel({ memories, memoryOn, onClose, onForget, onClear }) {
      const [confirmClear, setConfirmClear] = useState(false);
      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [onClose]);

      const facts = memories.filter((m) => m.kind === "fact");
      const voice = memories.filter((m) => m.kind === "voice");
      // Group facts by buyer so the panel reads "what I know about each account".
      const byBuyer = [];
      facts.forEach((m) => {
        let g = byBuyer.find((x) => x.label === m.scopeLabel);
        if (!g) { g = { label: m.scopeLabel, rows: [] }; byBuyer.push(g); }
        g.rows.push(m);
      });

      const Row = ({ m }) => (
        <div className="group/mem rounded-lg border hairline bg-surface px-4 py-3">
          <div className="flex items-start justify-between gap-3">
            <div className="min-w-0">
              <div className="text-[13px] leading-snug text-ink">{m.label}</div>
              {m.detail && <div className="mt-0.5 text-[11.5px] text-ink-3">{m.detail}</div>}
            </div>
            <button onClick={() => onForget(m.id)} title="Forget this" aria-label="Forget this"
              className="press shrink-0 rounded p-1 text-ink-3 opacity-0 transition-opacity hover:text-terracotta group-hover/mem:opacity-100">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M18 6 6 18M6 6l12 12" strokeLinecap="round" /></svg>
            </button>
          </div>
          <div className="mt-2.5 flex items-center justify-between">
            <span className="text-[10.5px] text-ink-3">{STRENGTH_WORDS[Math.min(m.strength, MAX_STRENGTH)]}</span>
            <ConfidenceBar strength={m.strength} />
          </div>
        </div>
      );

      return (
        <div className="fixed inset-0 z-40">
          <div className="absolute inset-0 bg-ink/30" onClick={onClose} aria-hidden="true" />
          <aside className="absolute right-0 top-0 flex h-screen w-[380px] max-w-[90vw] flex-col border-l hairline bg-paper shadow-xl">
            <div className="flex items-start justify-between gap-3 border-b hairline bg-surface-2/40 px-5 py-4">
              <div>
                <Eyebrow>Agent memory</Eyebrow>
                <h2 className="mt-1 font-display text-[19px] leading-tight text-ink">What I've learned from you</h2>
                <p className="mt-1 text-[12px] text-ink-3">{memoryOn ? "Learning is on. Edits you make teach the agent." : "Learning is paused. What's here stays, nothing new is captured."}</p>
              </div>
              <button onClick={onClose} aria-label="Close" className="press grid h-8 w-8 shrink-0 place-items-center rounded-full border hairline bg-surface text-ink-2 hover:text-ink">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M18 6 6 18M6 6l12 12" strokeLinecap="round" /></svg>
              </button>
            </div>

            <div className="min-h-0 flex-1 overflow-y-auto px-5 py-5">
              {memories.length === 0 ? (
                <div className="grid h-full place-items-center px-6 text-center">
                  <div>
                    <div className="mx-auto mb-4 grid h-12 w-12 place-items-center rounded-full border border-dashed border-line-2 text-ink-3">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M9.5 4.5a3 3 0 0 0-3 3 3 3 0 0 0-1.5 5.6V16a2.5 2.5 0 0 0 4.5 1.5M9.5 4.5A2.5 2.5 0 0 1 12 7v10a2.5 2.5 0 0 1-2.5 1.5M9.5 4.5a2.5 2.5 0 0 1 5 0M14.5 4.5a3 3 0 0 1 3 3 3 3 0 0 1 1.5 5.6V16a2.5 2.5 0 0 1-4.5 1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                    </div>
                    <p className="text-[13px] text-ink-2">Nothing learned yet.</p>
                    <p className="mt-1 text-[12px] text-ink-3">Swap a SKU or rewrite a draft and the agent starts picking up how you work.</p>
                  </div>
                </div>
              ) : (
                <div className="space-y-6">
                  {byBuyer.length > 0 && (
                    <div>
                      <Eyebrow className="mb-2.5">Facts about your buyers</Eyebrow>
                      <div className="space-y-4">
                        {byBuyer.map((g, gi) => (
                          <div key={gi}>
                            <div className="mb-1.5 text-[12px] font-semibold text-ink-2">{g.label}</div>
                            <div className="space-y-2">{g.rows.map((m, i) => <Row key={i} m={m} />)}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {voice.length > 0 && (
                    <div>
                      <Eyebrow className="mb-2.5">How you write</Eyebrow>
                      <div className="space-y-2">{voice.map((m, i) => <Row key={i} m={m} />)}</div>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Clear the whole store, with a one-step confirm so a demo can't wipe by accident */}
            {memories.length > 0 && (
              <div className="border-t hairline bg-surface-2/30 px-5 py-3">
                {confirmClear ? (
                  <div className="flex items-center justify-between gap-3">
                    <span className="text-[12.5px] text-ink-2">Forget everything the agent learned?</span>
                    <div className="flex items-center gap-1.5">
                      <button onClick={() => setConfirmClear(false)} className="press rounded-lg px-2.5 py-1.5 text-[12px] text-ink-3 hover:text-ink-2">Cancel</button>
                      <button onClick={() => { onClear(); setConfirmClear(false); }} className="press rounded-lg bg-terracotta px-3 py-1.5 text-[12px] font-medium text-cream hover:opacity-90">Clear all</button>
                    </div>
                  </div>
                ) : (
                  <button onClick={() => setConfirmClear(true)} className="press flex items-center gap-1.5 text-[12.5px] text-ink-3 hover:text-terracotta">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0v12a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7" strokeLinecap="round" strokeLinejoin="round" /></svg>
                    Clear all memory
                  </button>
                )}
              </div>
            )}
          </aside>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("home");
      const [mode, setMode] = useState("current"); // 'current' | 'proposed'
      const [w1Active, setW1Active] = useState("vialetto");
      const [nwActive, setNwActive] = useState("cardo");

      // The staggered reveal is a first-impression, not a per-click cost. Once the
      // user navigates (view or mode), screen swaps become instant.
      const [hasNavigated, setHasNavigated] = useState(false);
      const [navOpen, setNavOpen] = useState(false); // mobile nav drawer (lg- only)
      const [ticketOpen, setTicketOpen] = useState(false); // PulseBoard support-ticket modal
      const navTo = (v) => { setHasNavigated(true); setView(v); setNavOpen(false); };

      // Persona: 'am' (Nicholas Rath, workflow screens) | 'vp' (Customer Ops, PulseBoard).
      // Toggling lands on that persona's home view via navTo so the screen transition behaves.
      const [persona, setPersona] = useState("am");
      const togglePersona = () => {
        const next = persona === "am" ? "vp" : "am";
        setPersona(next);
        navTo(next === "vp" ? "pulse" : "home");
        // Auto-launch the destination persona's tour the first time it's seen in
        // Proposed; otherwise drop any tour left running from the prior persona.
        const shown = next === "vp" ? vpTourShown : amTourShown;
        if (mode === "proposed" && !shown) {
          (next === "vp" ? setVpTourShown : setAmTourShown)(true);
          startTour(next);
        } else {
          setTourActive(false);
        }
      };

      // Live workflow queues: which items the AM has handled this session. Lifted here,
      // above the keyed screen wrapper, so the sidebar counts and the screens share one
      // source of truth that persists across navigation (sending decrements the badge).
      const w2OriginalSent = useMemo(() => new Set(W2.messages.map((m, i) => m.status === "Sent" ? i : -1).filter((i) => i >= 0)), []);
      const [w2Sent, setW2Sent] = useState(w2OriginalSent);
      const [w2Skipped, setW2Skipped] = useState(() => new Set());
      const [w1Done, setW1Done] = useState(() => new Set());
      const [nwDone, setNwDone] = useState(() => new Set());
      const workflowApi = {
        w2Sent, w2Skipped, w1Done, nwDone,
        sendW2: (i) => setW2Sent((s) => new Set(s).add(i)),
        skipW2: (i) => setW2Skipped((s) => new Set(s).add(i)),
        doneW1: (id) => setW1Done((s) => new Set(s).add(id)),
        doneNW: (id) => setNwDone((s) => new Set(s).add(id)),
      };

      // Agent memory: the learning loop. Default ON so the demo shows it working;
      // the toggle proves it can be paused. memRef mirrors state for a synchronous
      // existence/strength lookup on capture (so a repeat edit bumps confidence
      // instead of duplicating the memory).
      const [memoryOn, setMemoryOn] = useState(true);
      const [memories, setMemories] = useState([]);
      const memRef = useRef([]);
      const [memToast, setMemToast] = useState(null);
      const [memOpen, setMemOpen] = useState(false);

      const captureMemory = (rec) => {
        const prev = memRef.current;
        const i = prev.findIndex((m) => m.id === rec.id);
        let strength, repeat, next;
        if (i >= 0) {
          strength = Math.min(prev[i].strength + 1, MAX_STRENGTH);
          repeat = true;
          next = prev.slice();
          next[i] = { ...next[i], ...rec, strength };
        } else {
          strength = 1; repeat = false;
          next = [...prev, { ...rec, strength }];
        }
        memRef.current = next;
        setMemories(next);
        setMemToast({ id: rec.id, label: rec.label, strength, repeat, seq: rec.id + ":" + strength });
      };
      // Forget a single memory, or wipe the whole store (memRef stays the source of truth).
      const forgetMemory = (id) => {
        const next = memRef.current.filter((m) => m.id !== id);
        memRef.current = next;
        setMemories(next);
      };
      const clearMemory = () => { memRef.current = []; setMemories([]); };
      // Undo the last toast's capture: a brand-new memory is removed; a reinforced one
      // has its strength bump rolled back one step.
      const undoCapture = () => {
        if (!memToast) return;
        const prev = memRef.current;
        const next = memToast.repeat
          ? prev.map((m) => m.id === memToast.id ? { ...m, strength: Math.max(1, m.strength - 1) } : m)
          : prev.filter((m) => m.id !== memToast.id);
        memRef.current = next;
        setMemories(next);
        setMemToast(null);
      };
      // Toast lingers ~5s so it reads in a live demo (and leaves time to hit Undo).
      useEffect(() => {
        if (!memToast) return;
        const t = setTimeout(() => setMemToast(null), 5000);
        return () => clearTimeout(t);
      }, [memToast]);

      // Capture + recall are live only in Proposed with memory on, so Current
      // stays the dumb control where edits vanish (the graded before/after).
      const memoryApi = (mode === "proposed" && memoryOn)
        ? { enabled: true, capture: captureMemory, memories }
        : { enabled: false, capture: () => {}, memories };

      // Onboarding tour: auto-launches on the FIRST switch to Proposed,
      // replayable anytime via the header "?" button.
      const [tourActive, setTourActive] = useState(false);
      const [tourStep, setTourStep] = useState(0);
      const [tourKind, setTourKind] = useState("am"); // which persona's tour is running
      // Each persona's tour auto-shows once: AM on first Proposed entry, VP on
      // first VP visit while in Proposed.
      const [amTourShown, setAmTourShown] = useState(false);
      const [vpTourShown, setVpTourShown] = useState(false);
      // Launch a specific persona's tour. Setting the persona keeps the sidebar
      // consistent with the screens the tour drives (no-op for the "?" replay,
      // which always passes the current persona).
      const startTour = (kind) => {
        setTourKind(kind);
        setPersona(kind);
        setTourStep(0);
        setTourActive(true);
      };
      const endTour = () => setTourActive(false);

      // Route from the Home cockpit into the right tab + open the right brief/moment.
      const go = (v, target) => {
        setHasNavigated(true);
        if (v === "w1" && target) setW1Active(target);
        if (v === "neww" && target) setNwActive(target);
        setView(v);
      };

      // If we leave Proposed while on the net-new tab, fall back to Home.
      const safeSetMode = (m) => {
        setHasNavigated(true);
        if (m === "current" && view === "neww") setView("home");
        if (m === "current" && tourActive) setTourActive(false);
        setMode(m);
        // First time the user reaches Proposed, walk them through what changed —
        // the tour for whichever persona they're currently in.
        if (m === "proposed") {
          if (persona === "am" && !amTourShown) { setAmTourShown(true); startTour("am"); }
          else if (persona === "vp" && !vpTourShown) { setVpTourShown(true); startTour("vp"); }
        }
      };

      return (
        <MemoryContext.Provider value={memoryApi}>
         <WorkflowContext.Provider value={workflowApi}>
          <div className="flex h-screen overflow-hidden">
            <Sidebar view={view} setView={navTo} mode={mode} navOpen={navOpen} persona={persona} onTogglePersona={togglePersona} />
            {navOpen && <div className="fixed inset-0 z-30 bg-ink/30 lg:hidden" onClick={() => setNavOpen(false)} aria-hidden="true" />}
            <main className="relative z-10 flex min-w-0 flex-1 flex-col">
              <Header view={view} mode={mode} setMode={safeSetMode} onMenu={() => setNavOpen(true)} onTour={() => startTour(persona)} onTicket={() => setTicketOpen(true)}
                memoryOn={memoryOn} setMemoryOn={setMemoryOn} memCount={memories.length} onMemory={() => setMemOpen(true)} />
              <div key={view + mode} className={"min-h-0 flex-1 overflow-y-auto" + (hasNavigated ? " screen-enter" : " reveal-root")}>
                <Screen view={view} mode={mode}
                  w1Active={w1Active} setW1Active={setW1Active}
                  nwActive={nwActive} setNwActive={setNwActive} go={go} />
              </div>
            </main>
          </div>
          {tourActive && (
            <TourOverlay steps={tourKind === "vp" ? VP_TOUR : AM_TOUR} step={tourStep} setStep={setTourStep}
              view={view} setView={setView}
              setW1Active={setW1Active} setNwActive={setNwActive} onEnd={endTour} />
          )}
          {ticketOpen && <SupportTicketModal mode={mode} onClose={() => setTicketOpen(false)} />}
          {memOpen && <MemoryPanel memories={memories} memoryOn={memoryOn} onClose={() => setMemOpen(false)} onForget={forgetMemory} onClear={clearMemory} />}
          <MemoryToast toast={memToast} onUndo={undoCapture} />
         </WorkflowContext.Provider>
        </MemoryContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
