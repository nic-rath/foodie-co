    /* Mobile nav drawer: off-canvas below lg, normal static column at lg+. CDN-independent

    @media (max-width: 1023.98px) {
      aside.nav-drawer {            /* element+class beats Tailwind's .relative / .bg-paper utilities regardless of inject order */
        position: fixed;

    }
    @media (prefers-reduced-motion: reduce) { aside.nav-drawer { transition: none; } }

    /* Staggered page-load reveal */
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Staggered reveal, gated to the first app paint only. The router remounts
       screens on every nav (key=view+mode); without a gate the stagger replays on
       every click. So .reveal content is visible by default, and only animates when
       an ancestor carries .reveal-root (present on first paint, dropped after). */
    .reveal > * { opacity: 1; }
    .reveal-root .reveal > * { opacity: 0; animation: rise 0.42s cubic-bezier(0.22,0.61,0.36,1) forwards; }
    .reveal-root .reveal > *:nth-child(1) { animation-delay: 0s; }
    .reveal-root .reveal > *:nth-child(2) { animation-delay: 0.04s; }
    .reveal-root .reveal > *:nth-child(3) { animation-delay: 0.08s; }
    .reveal-root .reveal > *:nth-child(4) { animation-delay: 0.12s; }
    .reveal-root .reveal > *:nth-child(5) { animation-delay: 0.16s; }
    .reveal-root .reveal > *:nth-child(6) { animation-delay: 0.20s; }

    @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
    .fadein { animation: fadein 0.5s ease forwards; }

    /* Tab-switch enter, the light counterpart to the first-paint stagger.
       Applied to the screen container on every nav AFTER the first (mutually
       exclusive with .reveal-root). Fade + 12px settle + a brief blur that
       "focuses in", pronounced enough to read between similar layouts, still
       under 300ms so it stays snappy clicked tens of times a day. */
    @keyframes screenEnter {
      from { opacity: 0; transform: translateY(16px); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    /* Tasteful production value: fade-up + a "focus-in" blur. 320ms so it's
       comfortably perceptible (240ms read as invisible) while staying snappy. */
    .screen-enter { animation: screenEnter 0.32s var(--ease-out) both; }

    /* Daily-volume bars, hover lifts & spotlights one bar; the rest dim back.
       .vchart .vbar:hover (0,0,3) beats Tailwind's .bg-olive/70 (0,0,1), so the
       color deepen wins regardless of Play-CDN inject order. */
    .vbar { transition: opacity 200ms var(--ease-out), transform 200ms var(--ease-out), background-color 200ms var(--ease-out); }
    .vchart:hover .vbar { opacity: 0.4; }
    .vchart .vbar:hover { opacity: 1; transform: translateY(-6px); background-color: #5E6B3F; }

    /* Press feedback, every pressable surface acknowledges the touch.
       Scoped to button.press so it deterministically owns the transition
       (element+class beats Tailwind's bare .transition-* utility, whatever
       order the CDN injects in) and animates hover + press on one clock. */
    button.press {
      transition: transform 150ms var(--ease-out),
                  background-color 200ms var(--ease-out),
                  color 200ms var(--ease-out),
                  box-shadow 200ms var(--ease-out),
                  border-color 200ms var(--ease-out);
    }
    button.press:active { transform: scale(0.98); }

    /* Respect reduced motion: keep the fade for comprehension, drop the travel. */
    @media (prefers-reduced-motion: reduce) {
      .reveal-root .reveal > * { animation: fadein 0.3s ease forwards; }
      .screen-enter { animation: fadein 0.18s ease both; }
      button.press:active { transform: none; }
      .vchart .vbar:hover { transform: none; }
    }

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D2C2A4; border-radius: 99px; border: 3px solid #F1E8D8; }

        body: "Campaigns now flag anyone you contacted too recently, so you can skip the send instead of over-emailing." },
      { view: "w2", target: "nav-neww", placement: "right",
        title: "New: proactive outreach",
        body: "It surfaces accounts cooling off or overdue so you can act before they slip." },
      { view: "neww", nw: "cardo", target: "neww-card", placement: "top",
        title: "Why it surfaced, ready to act",
        body: "Each account shows the trigger that flagged it and its relationship health, then lets you draft the outreach right there." },
    ];

    const VP_TOUR = [
      { view: "pulse", click: "pulse-tab-outcomes", target: "pulse-outcome", placement: "below",
        title: "Outcome first, not activity",
        body: "The leadership view leads with the outcome that matters and works back to the signals behind it." },
      { view: "pulse", click: "pulse-tab-outcomes", target: "pulse-insight", placement: "top",
        title: "The trend, explained",
        body: "It spells out what's driving the trend in one line, instead of leaving leadership to read it off the charts." },
      { view: "pulse", click: "pulse-tab-activity", target: "pulse-activity", placement: "below",
        title: "Activity, split by workflow",
        body: "The Activity tab breaks accuracy and effort down by inbound versus outbound, instead of one blended score." },
      { view: "pulse", click: "pulse-tab-activity", target: "pulse-volume", placement: "top",
        title: "Where the load is going",
        body: "Daily message volume, stacked by inbound versus outbound, so the trend in each workflow is visible, not blended into one line." },
      { view: "pulse", click: "pulse-tab-activity", target: "pulse-wf-inbound", placement: "top",
        title: "Inbound, operationally",
        body: "How the inbound workflow actually runs day to day: how often drafts get edited, how deep those edits go, and what AMs change most." },
      { view: "pulse", click: "pulse-tab-activity", target: "pulse-wf-outbound", placement: "top",
        title: "Outbound, operationally",
        body: "The same read for campaigns: edit effort, conversion, unsubscribe risk, and how AMs feel about the workload." },
    ];

    /* ============================================================
       PRESENTATIONAL PRIMITIVES
       ============================================================ */
    function Eyebrow({ children, className = "" }) {
      return <div className={"eyebrow " + className}>{children}</div>;
    }

    function Tag({ children, tone = "neutral" }) {
      const tones = {
        neutral:    "bg-paper-2 text-ink-2 border-line-2",
        olive:      "bg-olive/10 text-olive-deep border-olive/25",
        gold:       "bg-gold/12 text-[#7c5616] border-gold/30",
        quiet:      "bg-transparent text-ink-3 border-line",
        terracotta: "bg-terracotta/12 text-terracotta border-terracotta/30",
      };
      return (
        <span className={"inline-flex items-center gap-1.5 rounded-full border px-2.5 py-0.5 text-[11px] font-medium tracking-wide " + tones[tone]}>
          {children}
        </span>
      );
    }

    // ---- shared helpers ----
    const ACCT = (id) => ACCOUNTS.find((a) => a.id === id) || {};
    const firstName = (n) => (n || "").replace("Chef ", "").split(" ")[0];

    // Days since last contact, Date-free (the runtime avoids Date.now; all dates are 2026 May/Jun).
    // Ordinal: May 1 = day 1, May 31 = 31, Jun 1 = 32, Jun 2 = 33 (= "today").
    const _MO = { Apr: -30, May: 0, Jun: 31 };
    const dayOrd = (s) => { const [m, d] = (s || "").split(" "); return (_MO[m] ?? 0) + parseInt(d, 10); };
    const TODAY_ORD = dayOrd("Jun 2");
    const daysSinceContact = (lastStr) => TODAY_ORD - dayOrd(lastStr);
    const RECENT_DAYS = 3; // tunable: a W2 buyer contacted within this many days is flagged as over-emailed (kept tight so the flag is a meaningful handful, not half the book)
    const acctFor = (m) => ACCOUNTS.find((a) => a.name === m.account) || null;

    // Why each buyer is on the truffle pre-order list. Story accounts get a hand-authored,
    // individually-grounded reason; everyone else gets an honest segment-level one (W2 is a
    // product-triggered broadcast, so a generated buyer's relevance is cuisine + volume, not a
    // bespoke event). Em-dash free per project rule.
    const W2_REASON = {
      "Enoteca Cardo":       "Ran about 1.1kg of by-the-gram truffle last season. Top account, weekly.",
      "Locanda Pietra":      "Tartare and tajarin moved well last December. Truffle-forward menu.",
      "Osteria Fienile":     "Features white truffle on the autumn tasting menu most years.",
      "Trattoria Mareggio":  "High-volume Northern Italian kitchen. Truffle suits the autumn menu.",
      "Cantina Rossi":       "Modern Italian, high value. Strong fit for a seasonal truffle feature.",
      "Ristorante Belmonte": "Asked about seasonal specialties last fall. On cadence.",
      "Trattoria Vialetto":  "Weekly Neapolitan account. Truffle is a natural autumn upsell.",
    };
    const w2Reason = (acct, d) => {
      if (W2_REASON[acct.name]) return W2_REASON[acct.name];
      const tier = acct.value >= 120 ? "High-volume kitchen" : acct.value >= 80 ? "Steady volume" : "Smaller account";
      return (d.cuisine || "Italian") + ". " + tier + ", white truffle is a natural autumn add.";
    };

    // W2 has 40 messages and (unlike W1) no hand-authored alternates. Regenerate cycles
    // [original, warmer, concise]: two reusable truffle-campaign rephrasings personalized
    // only by first name + account. Variant 0 keeps each message's bespoke detail; B/C are
    // intentionally more generic (realistic for a re-draft). Em-dash free, no sign-off.
    function w2Alts(m) {
      const f = firstName(m.buyer);
      const a = m.account;
      return [
        m.text,
        "Hi " + f + ", hope service has been good. Alba white truffle pre-orders just opened and I wanted " + a + " to have first pick. I can hold your allocation now so supply is never the thing you're chasing this autumn. Want me to reserve a standing weekly weight?",
        f + ", Alba white truffle pre-orders are open and I've reserved first-pick allocation for " + a + ". Shall I lock your weekly weight before lots fill?",
      ];
    }

    // Correcting a fact (e.g. a wrong SKU) flows into the draft reply: replace every
    // literal occurrence of the old value with the new one.
    function syncValue(text, oldVal, newVal) {
      if (!text || !oldVal || oldVal === newVal) return text;
      const esc = oldVal.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return text.replace(new RegExp(esc, "g"), newVal);
    }
    // The Lot field carries a "LOT " prefix in the strip but prose says "lot 24-RA-0915";
    // strip the leading LOT/lot token so the bare code gets replaced too.
    const bareCode = (v) => (v || "").replace(/^lot\s+/i, "");

    // Picking a product from the catalog corrects several stock fields at once
    // (product, sku, lot, status). Run the old->new replacement for every changed
    // field over the same draft text in one pass (lot also via bareCode, matching
    // the single-field edit path).
    function syncFields(text, oldObj, newObj, keys) {
      let out = text;
      for (const k of keys) {
        out = syncValue(out, oldObj[k], newObj[k]);
        if (k === "lot") out = syncValue(out, bareCode(oldObj[k]), bareCode(newObj[k]));
      }
      return out;
    }

    /* ============================================================
       AGENT MEMORY, the loop that learns from AM edits.
       The agent watches the corrections an AM makes (SKU swaps, fact
       fixes, and the way they rewrite a draft) and remembers them, so
       the next brief arrives pre-shaped to how this AM works. Three
       moments are made visible: CAPTURE (a "Learned" toast on edit),
       STORE (the slide-over panel), RECALL ("Applied what you taught
       me" on the next brief). Proposed-only, so Current stays the dumb
       control. All in-memory, no persistence.
       ============================================================ */
    const MemoryContext = React.createContext({ enabled: false, capture: () => {}, memories: [] });
    // Live per-workflow "handled" state, lifted to the app shell so the sidebar counts
    // and the screens share one source of truth that persists across navigation.
    const WorkflowContext = React.createContext({
      w2Sent: new Set(), w2Skipped: new Set(), w1Done: new Set(), nwDone: new Set(),
      sendW2: () => {}, skipW2: () => {}, doneW1: () => {}, doneNW: () => {},
    });
    const MAX_STRENGTH = 4;
    // Strength is a plain repeat-counter, so confidence is deterministic.
    const STRENGTH_WORDS = ["", "Noticed", "Learning", "Confident", "Strong"];

    // Phrase a captured fact correction for the toast + store.
    function factLabel(key, val, product) {
      if (key === "sku") return "Use SKU " + val;
      if (key === "lot") return "Lot to reference is " + val;
      if (key === "status") return "Stock reads: " + val;
      if (key === "product") return "Item is " + val;
      return val;
    }

    // Coarse, deterministic classifier of how the AM rewrote the agent's
    // draft. Compares the agent baseline to the sent text and returns zero
    // or more stylistic signals. Returns nothing on a no-op, so trivial
    // edits never get captured.
    const VOICE_LABELS = {
      shorter:  "You keep replies short and to the point",
      longer:   "You add more context than the draft gives",
      direct:   "You write in fewer, more direct sentences",
      signoff:  "You sign off in your own way",
      warmer:   "You warm up the tone before sending",
    };
    function classifyVoiceEdit(baseline, final) {
      const out = [];
      const b = (baseline || "").trim();
      const fnl = (final || "").trim();
      if (!fnl || fnl === b) return out;
      const lenB = b.length, lenF = fnl.length;
      if (lenB > 0 && lenF <= lenB * 0.7) out.push("shorter");
      else if (lenB > 0 && lenF >= lenB * 1.3) out.push("longer");
      const sentences = (s) => (s.match(/[.!?]/g) || []).length;
      if (sentences(b) - sentences(fnl) >= 2) out.push("direct");
      const lastLine = (s) => { const ls = s.split(/\n/).map((x) => x.trim()).filter(Boolean); return ls.length ? ls[ls.length - 1] : ""; };
      if (lastLine(b) && lastLine(fnl) && lastLine(b) !== lastLine(fnl)) out.push("signoff");
      const warm = (s) => /\b(hope|thanks|thank you|happy|glad|appreciate|look forward)\b/i.test(s);
      if (!warm(b) && warm(fnl)) out.push("warmer");
      return out;
    }

    // Confidence meter, reused by the toast, the store panel, and recall.
    function ConfidenceBar({ strength, showLabel = false }) {
      return (
        <div className="flex items-center gap-2">
          <div className="h-1.5 w-16 overflow-hidden rounded-full bg-paper-2">
            <div className="h-full w-full origin-left rounded-full bg-olive"
              style={{ transform: "scaleX(" + (Math.min(strength, MAX_STRENGTH) / MAX_STRENGTH) + ")", transition: "transform 320ms var(--ease-out)" }} />
          </div>
          {showLabel && <span className="text-[10.5px] text-ink-3">{STRENGTH_WORDS[Math.min(strength, MAX_STRENGTH)]}</span>}
        </div>
      );
    }

    // Inline click-to-edit: click a value to turn it into a compact input;
    // commit on Enter/blur, Esc cancels. Used by the W1 facts strip and StockRow.
    function EditableField({ value, onCommit, mono = true, className = "" }) {
      const [editing, setEditing] = useState(false);
      const [val, setVal] = useState(value);
      useEffect(() => { setVal(value); }, [value]);

      const commit = () => {
        setEditing(false);
        if (val.trim() && val.trim() !== value) onCommit(val.trim());
        else setVal(value);
      };

      if (editing) {
        return (
          <input
            autoFocus
            value={val}
            onChange={(e) => setVal(e.target.value)}
            onBlur={commit}
            onKeyDown={(e) => {
              if (e.key === "Enter") commit();
              if (e.key === "Escape") { setVal(value); setEditing(false); }
            }}
            size={Math.max(val.length, 4)}
            className={"rounded border border-olive/40 bg-cream px-1.5 py-0.5 text-[12.5px] text-ink focus:outline-none focus:ring-1 focus:ring-olive/40 " + (mono ? "num " : "") + className}
          />
        );
      }
      return (
        <button
          onClick={() => setEditing(true)}
          title="Click to edit"
          className={"group/ef inline-flex items-center gap-1 rounded px-0.5 text-[12.5px] text-ink hover:bg-olive/8 " + (mono ? "num " : "") + className}>
          {value}
          <svg className="opacity-0 transition-opacity group-hover/ef:opacity-60 text-ink-3" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M3 21v-3.5L16.5 4l3.5 3.5L6.5 21z" strokeLinejoin="round"/></svg>
        </button>
      );
    }

    // Pick-don't-type SKU correction: click the SKU to open a searchable dropdown of
    // products (the brief's recommended substitutions first, then the full catalog).
    // Picking one swaps the whole stock fact via onPick(entry); a non-matching filter
    // can still be committed as a plain free-typed SKU (onPickRaw), preserving the old
    // escape hatch.
    function ProductPicker({ value, recommended = [], onPick, onPickRaw }) {
      const [open, setOpen] = useState(false);
      const [q, setQ] = useState("");
      const wrapRef = useRef(null);

      // Close on outside mousedown / Escape while open.
      useEffect(() => {
        if (!open) return;
        const onDown = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) close(); };
        const onKey = (e) => { if (e.key === "Escape") close(); };
        document.addEventListener("mousedown", onDown);
        document.addEventListener("keydown", onKey);
        return () => { document.removeEventListener("mousedown", onDown); document.removeEventListener("keydown", onKey); };
      }, [open]);

      const close = () => { setOpen(false); setQ(""); };
      const match = (e) => (e.product + " " + e.sku).toLowerCase().includes(q.trim().toLowerCase());
      const recSkus = new Set(recommended.map((r) => r.entry.sku));
      const recHits = recommended.filter((r) => match(r.entry));
      const catHits = SKU_CATALOG.filter((e) => !recSkus.has(e.sku) && match(e));
      const choose = (entry) => { onPick && onPick(entry); close(); };
      const empty = recHits.length === 0 && catHits.length === 0;

      return (
        <span ref={wrapRef} className="relative inline-block">
          <button
            onClick={() => setOpen((o) => !o)}
            title="Click to pick the right product"
            className="group/ef inline-flex items-center gap-1 rounded px-0.5 num text-[12.5px] text-ink hover:bg-olive/8">
            {value}
            <svg className="opacity-0 transition-opacity group-hover/ef:opacity-60 text-ink-3" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M3 21v-3.5L16.5 4l3.5 3.5L6.5 21z" strokeLinejoin="round"/></svg>
          </button>

          {open && (
            <div className="absolute left-0 top-full z-30 mt-1.5 w-[268px] sm:w-[300px] max-w-[calc(100vw-1.5rem)] overflow-hidden rounded-lg border hairline bg-cream deckle">
              <div className="border-b hairline bg-surface-2/40 p-2">
                <input
                  autoFocus
                  value={q}
                  onChange={(e) => setQ(e.target.value)}
                  placeholder="Search products or SKU"
                  className="w-full rounded border border-olive/40 bg-cream px-2 py-1 text-[12.5px] text-ink placeholder:text-ink-3 focus:outline-none focus:ring-1 focus:ring-olive/40"
                />
              </div>
              <div className="max-h-[260px] overflow-y-auto py-1">
                {recHits.length > 0 && (
                  <div>
                    <div className="eyebrow !text-[9px] px-3 pb-1 pt-1.5">Recommended for this account</div>
                    {recHits.map((r, i) => (
                      <ProductPickerRow key={"r" + i} entry={r.entry} flag={r.flag} note={r.note} onChoose={choose} />
                    ))}
                  </div>
                )}
                {catHits.length > 0 && (
                  <div>
                    {recHits.length > 0 && <div className="eyebrow !text-[9px] px-3 pb-1 pt-2">Catalog</div>}
                    {catHits.map((e) => (
                      <ProductPickerRow key={e.sku} entry={e} onChoose={choose} />
                    ))}
                  </div>
                )}
                {empty && (
                  q.trim()
                    ? <button
                        onClick={() => { onPickRaw && onPickRaw(q.trim()); close(); }}
                        className="block w-full px-3 py-2 text-left text-[12.5px] text-ink hover:bg-olive/8">
                        Use "<span className="num">{q.trim()}</span>" as SKU
                      </button>
                    : <div className="px-3 py-2 text-[12.5px] text-ink-3">No products found.</div>
                )}
              </div>
            </div>
          )}
        </span>
      );
    }

    function ProductPickerRow({ entry, flag, note, onChoose }) {
      return (
        <button
          onClick={() => onChoose(entry)}
          className="block w-full px-3 py-1.5 text-left hover:bg-olive/8">
          <div className="flex items-center gap-2">
            <span className="text-[13px] font-medium text-ink">{entry.product}</span>
            {flag === "rejected" && <span className="rounded bg-terracotta/12 px-1.5 py-0.5 text-[10px] font-medium text-terracotta">rejected before</span>}
            {flag === "new" && <span className="rounded bg-olive/12 px-1.5 py-0.5 text-[10px] font-medium text-olive-deep">not tried</span>}
          </div>
          <div className="num text-[11px] text-ink-3">{entry.sku} · {entry.status}</div>
          {note && <div className={"text-[11.5px] " + (flag === "rejected" ? "text-terracotta" : "text-ink-3")}>{note}</div>}
        </button>
      );
    }

    const HEALTH = {
      "at-risk": { label: "At-risk",  text: "text-terracotta",  chip: "bg-terracotta/12 text-terracotta border-terracotta/30", edge: "#A6492E", dot: "bg-terracotta", def: "Pattern broken (overdue reorder or open complaint). Likely to churn." },
      "cooling": { label: "Cooling",  text: "text-[#7c5616]",   chip: "bg-gold/15 text-[#7c5616] border-gold/35",            edge: "#B07D3C", dot: "bg-gold", def: "Still ordering, but a signal is slipping. Nudge now." },
      "healthy": { label: "Healthy",  text: "text-olive-deep",  chip: "bg-olive/12 text-olive-deep border-olive/30",          edge: "#5E6B3F", dot: "bg-olive", def: "Ordering on cadence, steady volume. Engaged." },
    };
    const TONE = {
      routine:   { label: "Routine reorder", chip: "bg-olive/10 text-olive-deep border-olive/25", edge: "#5E6B3F" },
      complaint: { label: "Needs care",      chip: "bg-terracotta/12 text-terracotta border-terracotta/30", edge: "#A6492E" },
      growth:    { label: "Growth signal",   chip: "bg-gold/12 text-[#7c5616] border-gold/30", edge: "#B07D3C" },
    };
    const TRIGGER_TONE = { Risk: "terracotta", Opportunity: "gold", Maintenance: "olive" };

    // Minimal SVG sparkline
    function Spark({ data, color = "#5E6B3F", w = 184, h = 46, fill = false, dashTo, lo, hi, activeIdx = null, onActiveIdx, interactive = false }) {
      const [selfIdx, setSelfIdx] = useState(null);
      const max = hi != null ? hi : Math.max(...data);
      const min = lo != null ? lo : Math.min(...data);
      const span = (max - min) || 1;
      const pt = (d, i) => [ (i / (data.length - 1)) * w, h - 4 - ((d - min) / span) * (h - 9) ];
      const pts = data.map(pt);
      const line = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
      const area = line + " L " + w + " " + h + " L 0 " + h + " Z";
      // Hover interactivity, three modes:
      //  • controlled: parent passes activeIdx + onActiveIdx (number-linked charts)
      //  • self-managed: parent passes `interactive` only (dot-follow, no parent state)
      //  • externally-driven dot: parent passes activeIdx only (overlaid multi-line, parent owns mouse)
      const controlled = typeof onActiveIdx === "function";
      const wantHandlers = controlled || interactive;
      const cur = controlled ? activeIdx : (interactive ? selfIdx : activeIdx);
      const dotIdx = cur == null ? pts.length - 1 : cur;
      const setIdx = controlled ? onActiveIdx : setSelfIdx;
      const handleMove = (e) => {
        const r = e.currentTarget.getBoundingClientRect();
        const idx = Math.max(0, Math.min(data.length - 1, Math.round(((e.clientX - r.left) / r.width) * (data.length - 1))));
        setIdx(idx);
      };
      return (
        <svg width={w} height={h} viewBox={"0 0 " + w + " " + h} preserveAspectRatio="none" className="overflow-visible"
          onMouseMove={wantHandlers ? handleMove : undefined}
          onMouseLeave={wantHandlers ? (() => setIdx(null)) : undefined}>
          {wantHandlers && <rect x="0" y="0" width={w} height={h} fill="transparent" />}
          {fill && <path d={area} fill={color} opacity="0.10" />}
          <path d={line} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
          <circle cx={pts[dotIdx][0]} cy={pts[dotIdx][1]} r="2.6" fill={color} />
        </svg>
      );
    }

    // Small stat tile (Current PulseBoard): hover the sparkline → the headline reads that point.
    function StatTile({ t }) {
      const [idx, setIdx] = useState(null);
      const cur = idx == null ? t.d.length - 1 : idx;
      return (
        <div className="rounded-xl border hairline bg-surface px-4 py-3">
          <Eyebrow className="!text-[9px]">{t.t}</Eyebrow>
          <div className="mt-1 font-display text-[19px] leading-none text-ink tnum">{t.fmt(t.d[cur])}</div>
          <div className="mb-1 text-[10.5px] text-ink-2">{t.s}</div>
          <Spark data={t.d} color="#8B7D6A" w={150} h={22} activeIdx={idx} onActiveIdx={setIdx} />
        </div>
      );
    }

    // Reusable sort control, button + popover menu. `options` = [{id, label}].
    function SortMenu({ value, options, onChange, accent }) {
      const [open, setOpen] = useState(false);
      const cur = options.find((o) => o.id === value) || options[0];
      const base = accent
        ? "border-olive/30 bg-olive/8 text-olive-deep"
        : "hairline bg-surface text-ink-2 hover:bg-surface-2";
      return (
        <div className="relative">
          <button onClick={() => setOpen((o) => !o)}
            className={"press flex items-center gap-1.5 rounded-lg border px-3 py-2 text-[13px] font-medium " + base}>
            Sort: {cur.label}
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"
              className={"transition-transform " + (open ? "rotate-180" : "")}>
              <path d="m6 9 6 6 6-6" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </button>
          {open && (
            <>
              <div className="fixed inset-0 z-10" onClick={() => setOpen(false)} />
              <div className="absolute right-0 z-20 mt-1.5 w-48 overflow-hidden rounded-xl border hairline bg-cream py-1 shadow-lg deckle">
                {options.map((o) => (
                  <button key={o.id} onClick={() => { onChange(o.id); setOpen(false); }}
                    className={"flex w-full items-center justify-between px-3.5 py-2 text-left text-[13px] hover:bg-surface-2 " +
                      (o.id === value ? "text-olive-deep font-medium" : "text-ink-2")}>
                    {o.label}
                    {o.id === value && (
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M20 6 9 17l-5-5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                    )}
                  </button>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    /* Pagination: any list over `pageSize` (default 10) splits into pages.
       resetKey (e.g. query+sort) jumps back to page 1 when the filter changes;
       the safe-page clamp keeps the view valid when the list shrinks (e.g. W2 Send). */
    function usePaged(items, pageSize = 10, resetKey) {
      const [page, setPage] = useState(0);
      useEffect(() => { setPage(0); }, [resetKey]);
      const total = items.length;
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      const safe = Math.min(page, totalPages - 1);
      const start = safe * pageSize;
      const end = Math.min(start + pageSize, total);
      return { pageItems: items.slice(start, end), page: safe, setPage, totalPages, total, start, end };

    // Step a "May 28" style date back/forward by a number of days across Apr/May/Jun.
    const MON_LEN = { Apr: 30, May: 31, Jun: 30 };
    const MON_SEQ = ["Apr", "May", "Jun"];
    function stepDate(s, deltaDays) {
      const parts = String(s).split(" ");
      let idx = MON_SEQ.indexOf(parts[0]);
      if (idx < 0) return s;
      let day = parseInt(parts[1], 10) + deltaDays;
      while (day < 1 && idx > 0) { idx--; day += MON_LEN[MON_SEQ[idx]]; }
      while (day > MON_LEN[MON_SEQ[idx]] && idx < MON_SEQ.length - 1) { day -= MON_LEN[MON_SEQ[idx]]; idx++; }
      if (day < 1) day = 1;
      return MON_SEQ[idx] + " " + day;
    }

      const slug = (a.name || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
      const cadence = o.cadence || (a.value >= 120 ? "Weekly" : a.value >= 80 ? "Every 2 weeks" : "Monthly");
      const perYear = cadence === "Weekly" ? 52 : cadence === "Every 2 weeks" ? 26 : 12;
      const avgNum = Math.round((a.value * 1000) / perYear);
      const topItems = o.topItems || [ITEM_POOL[a.id % ITEM_POOL.length], ITEM_POOL[(a.id * 3 + 5) % ITEM_POOL.length]];
      const title = o.title || (isChef ? "Executive Chef" : (a.id % 3 === 0 ? "Owner" : a.id % 3 === 1 ? "Head Buyer" : "Beverage Director"));
      const email = o.email || (fname.toLowerCase() + "@" + slug + ".com");
      const phone = o.phone || ("(212) 555-0" + String(100 + (a.id * 7) % 900));
      const cuisine = o.cuisine || CUISINE_POOL[a.id % CUISINE_POOL.length];
      const since = o.since || (2014 + (a.id % 10));
      const stepDays = cadence === "Weekly" ? 7 : cadence === "Every 2 weeks" ? 14 : 30;
      const recent = [0, 1, 2].map((k) => ({
        date: stepDate(a.last, -k * stepDays),
        summary: topItems[k % topItems.length] + (k === 0 ? " plus staples" : ""),
        amount: "$" + Math.round(avgNum * (1 + (((a.id + k) % 5) - 2) * 0.06)).toLocaleString(),

      return { title, email, phone, cuisine, since, note: o.note || null, cadence, avgOrder: "$" + avgNum.toLocaleString(), topItems, recent };

                <span className="hidden lg:inline">Create support ticket</span>
              </button>

            {/* Agent memory: the store panel + the on/off toggle. Scoped to AM workspaces —

            {mode === "proposed" && view !== "pulse" && (
              <button
                onClick={onMemory}
                data-tour="memory"
                aria-label="What the agent learned from you"
                title="What the agent learned from you"

              >
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M9.5 4.5a3 3 0 0 0-3 3 3 3 0 0 0-1.5 5.6V16a2.5 2.5 0 0 0 4.5 1.5M9.5 4.5A2.5 2.5 0 0 1 12 7v10a2.5 2.5 0 0 1-2.5 1.5M9.5 4.5a2.5 2.5 0 0 1 5 0M14.5 4.5a3 3 0 0 1 3 3 3 3 0 0 1 1.5 5.6V16a2.5 2.5 0 0 1-4.5 1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>

            <Pager page={pg.page} totalPages={pg.totalPages} total={pg.total} start={pg.start} end={pg.end} onChange={pg.setPage} label="accounts" />

    /* ============================================================
       SCREEN B, W1 (current): inquiry + finished flat draft
       ============================================================ */
    function W1Current() {
      const [alts, setAlts] = useState([W1.draft, ...W1.draftAlts]);
      const [variant, setVariant] = useState(0);
      const [draft, setDraft] = useState(W1.draft);
      const [editing, setEditing] = useState(false);
      const [sent, setSent] = useState(false);
      const [regenerating, setRegenerating] = useState(false);
      const [facts, setFacts] = useState({ product: W1.product, sku: W1.sku, lot: W1.lot, status: W1.stock, inStock: true });

      // Correcting a fact updates the strip and flows into the draft + every regenerate alternate.
      const editFact = (key) => (newVal) => {
        const oldVal = facts[key];
        setFacts((f) => ({ ...f, [key]: newVal }));
        const apply = (t) => {
          let out = syncValue(t, oldVal, newVal);
          if (key === "lot") out = syncValue(out, bareCode(oldVal), bareCode(newVal));
          return out;
        };
        setAlts((a) => a.map(apply));
        setDraft((d) => apply(d));
      };

      // Picking a product from the catalog swaps all stock facts at once and syncs
      // every changed value into the draft + alternates.
      const pickProduct = (entry) => {
        const next = { ...facts, ...entry };
        const apply = (t) => syncFields(t, facts, next, ["product", "sku", "lot", "status"]);
        setFacts(next);
        setAlts((a) => a.map(apply));
        setDraft((d) => apply(d));
      };

      const regenerate = () => {
        setRegenerating(true);
        const next = (variant + 1) % alts.length;
        setTimeout(() => { setVariant(next); setDraft(alts[next]); setRegenerating(false); }, 450);
      };

      return (
        <div className="reveal mx-auto max-w-[860px] px-9 py-8">
          {/* The buyer inquiry */}
          <div className="rounded-xl border hairline bg-surface p-6 deckle">
            <div className="flex items-start justify-between gap-4">
              <div className="flex items-start gap-3.5">
                <div className="grid h-11 w-11 place-items-center rounded-full bg-paper-2 font-display text-[17px] text-ink-2">
                  E
                </div>
                <div>
                  <div className="font-display text-[17px] text-ink">{W1.buyer}</div>
                  <div className="text-[13px] text-ink-2">{W1.account} · <span className="text-ink-3">{W1.region}</span></div>
                </div>
              </div>
              <div className="text-right">
                <Tag tone="neutral">{W1.channel}</Tag>
                <div className="eyebrow mt-1.5 !text-[9px]">{W1.received}</div>
              </div>
            </div>
            <div className="mt-4 border-t hairline pt-4">
              <div className="text-[13px] font-semibold text-ink-2">{W1.subject}</div>
              <p className="mt-1.5 text-[15px] leading-relaxed text-ink">{W1.message}</p>
            </div>
          </div>

          {/* The agent's finished draft */}
          <div className="mt-5 overflow-hidden rounded-xl border hairline bg-cream deckle">
            <div className="flex items-center justify-between border-b hairline bg-surface-2/50 px-6 py-3">
              <div className="flex items-center gap-2">
                <span className="grid h-5 w-5 place-items-center rounded-full bg-olive/15 text-olive-deep">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.39 6.9H22l-6.2 4.5 2.4 7-6.2-4.6L5.8 20l2.4-7L2 8.9h7.61z"/></svg>
                </span>
                <Eyebrow>Agent draft · ready to send</Eyebrow>
              </div>
            </div>

            <div className="px-6 py-5">
              {/* Transactional facts, set quietly above the prose (shared with the proposed brief) */}
              <div className="mb-5">
                <StockRow stock={facts} onEdit={editFact} onPick={pickProduct} />
              </div>

              {editing ? (
                <textarea
                  value={draft}
                  onChange={(e) => setDraft(e.target.value)}
                  rows={11}
                  className="w-full resize-none rounded-lg border hairline bg-surface/50 px-4 py-3 font-sans text-[14.5px] leading-[1.7] text-ink focus:outline-none focus:ring-1 focus:ring-olive/40"
                />
              ) : (
                <p className="whitespace-pre-wrap font-sans text-[14.5px] leading-[1.7] text-ink"
                  style={{
                    opacity: regenerating ? 0.3 : 1,
                    filter: regenerating ? "blur(2px)" : "blur(0px)",
                    transition: "opacity 200ms var(--ease-out), filter 200ms var(--ease-out)",
                  }}>
                  {draft}
                </p>
              )}
            </div>

            {sent ? (
              <div className="flex items-center gap-3 border-t hairline bg-olive/8 px-6 py-4">
                <span className="grid h-7 w-7 place-items-center rounded-full bg-olive text-cream">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M20 6 9 17l-5-5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                </span>
                <div>
                  <div className="text-[13.5px] font-semibold text-ink">Sent to {firstName(W1.buyer)}</div>
                  <div className="text-[12px] text-ink-3">Reply delivered to {W1.account}. <button className="underline hover:text-ink-2" onClick={() => { setSent(false); setEditing(false); setDraft(alts[variant]); }}>Undo</button></div>
                </div>
              </div>
            ) : (
              /* Approver actions */
              <div className="flex items-center justify-between border-t hairline bg-surface-2/40 px-6 py-4">
                <button onClick={() => setEditing((e) => !e)}
                  className={"flex items-center gap-1.5 text-[13px] " + (editing ? "font-medium text-olive-deep" : "text-ink-2 hover:text-ink")}>
                  {editing ? (
                    <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 6 9 17l-5-5" strokeLinecap="round" strokeLinejoin="round"/></svg>Done editing</>
                  ) : (
                    <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M3 21v-3.5L16.5 4l3.5 3.5L6.5 21z" strokeLinejoin="round"/></svg>Edit</>
                  )}
                </button>
                <div className="flex items-center gap-2.5">
                  <button onClick={regenerate} disabled={regenerating}
                    className="flex items-center gap-1.5 rounded-lg border hairline bg-surface px-3.5 py-2 text-[13px] text-ink-2 hover:bg-surface-2 disabled:opacity-50">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" className={regenerating ? "animate-spin" : ""}><path d="M3 12a9 9 0 1 1 3 6.7M3 19v-4h4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    {regenerating ? "Regenerating…" : "Regenerate"}
                  </button>
                  <button onClick={() => { setEditing(false); setSent(true); }}
                    className="flex items-center gap-1.5 rounded-lg bg-olive px-5 py-2 text-[13px] font-medium text-cream shadow-sm hover:bg-olive-deep">
                    Send
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z" strokeLinejoin="round"/></svg>
                  </button>
                </div>
              </div>
            )}
          </div>

        </div>
      );
    }

    /* ============================================================
       SCREEN C, W2 (campaign): unchanged across states
       ============================================================ */
    function StatCard({ k, v, sub }) {
      return (
        <div className="rounded-xl border hairline bg-surface px-4 py-3.5">
          <Eyebrow className="!text-[9px]">{k}</Eyebrow>
          <div className="mt-1 flex items-baseline gap-2">
            <span className="font-display text-[24px] leading-none text-ink">{v}</span>
            <span className="text-[11.5px] text-ink-3">{sub}</span>
          </div>
        </div>
      );
    }

    function W2Screen({ mode }) {
      const proposed = mode === "proposed";
      const mem = React.useContext(MemoryContext);
      // sent + skipped are lifted to the app shell (WorkflowContext) so the sidebar count
      // and this list stay in sync and persist across navigation. The rest stays local.
      const wf = React.useContext(WorkflowContext);
      const sent = wf.w2Sent;
      const skipped = wf.w2Skipped;
      const [editingIdx, setEditingIdx] = useState(null);
      const [texts, setTexts] = useState(() => W2.messages.map((m) => m.text));
      const [variants, setVariants] = useState(() => W2.messages.map(() => 0));
      const [regen, setRegen] = useState(new Set());
      // Proposed-only over-contact governance: "Send anyway" suppresses the banner, "Skip this cycle" drops the card.
      const [dismissed, setDismissed] = useState(new Set());
      // Proposed-only: surface buyers we contacted most recently (the over-contact risks) up top.
      // Default to "recent" so the over-contact risks lead the list without an extra click.
      const [sort, setSort] = useState("recent");
      const W2_SORTS = [
        { id: "default", label: "Campaign order" },
        { id: "recent", label: "Recently contacted" },
      ];

      const reviewed = sent.size;

      const sendOne = (i) => {
        // Sending captures HOW the AM rewrote this campaign message: compare the
        // current agent variant to the sent text (so clicking Regenerate alone,
        // which leaves texts[i] equal to the variant, never counts as a voice edit).
        if (mem.enabled) {
          const base = w2Alts(W2.messages[i])[variants[i]];
          classifyVoiceEdit(base, texts[i]).forEach((sig) => mem.capture({
            kind: "voice", scope: "am", scopeLabel: "Your voice",
            id: "voice:" + sig, label: VOICE_LABELS[sig], origin: "toneRewrite",
          }));
        }
        wf.sendW2(i);
        if (editingIdx === i) setEditingIdx(null);
      };
      const setText = (i, v) => setTexts((t) => t.map((x, j) => (j === i ? v : x)));

      // Mirror W1's regenerate: brief dim+blur, then swap to the next variant. texts[i] stays
      // the single source of truth (view, edit, send), so this overwrites an in-progress edit.
      const regenerate = (i) => {
        setRegen((s) => new Set(s).add(i));
        setTimeout(() => {
          const alts = w2Alts(W2.messages[i]);
          const next = (variants[i] + 1) % alts.length;
          setVariants((v) => v.map((x, j) => (j === i ? next : x)));
          setText(i, alts[next]);
          setRegen((s) => { const n = new Set(s); n.delete(i); return n; });
        }, 450);
      };

      // "Recently contacted" sorts by smallest gap since last contact (ascending days), so the
      // flagged over-contact risks float to the top. Default keeps the curated campaign order.
      const daysFor = (i) => { const a = acctFor(W2.messages[i]); return a ? daysSinceContact(a.last) : Infinity; };
      const orderIdx = (arr) =>
        (proposed && sort === "recent") ? [...arr].sort((a, b) => daysFor(a) - daysFor(b)) : arr;
      const readyIdx = orderIdx(W2.messages.map((_, i) => i).filter((i) => !sent.has(i) && !skipped.has(i)));
      const sentIdx = orderIdx(W2.messages.map((_, i) => i).filter((i) => sent.has(i)));
      const pgR = usePaged(readyIdx, 10, proposed ? sort : "");
      const pgS = usePaged(sentIdx, 10, proposed ? sort : "");

      const renderCard = (i) => {
        const m = W2.messages[i];
        const isSent = sent.has(i);
        const isEditing = editingIdx === i;
        const isRegen = regen.has(i);
        const acct = proposed ? acctFor(m) : null;
        const days = acct ? daysSinceContact(acct.last) : Infinity;
        const flagged = proposed && !isSent && days <= RECENT_DAYS;
        return (
          <div key={i} className="rounded-xl border hairline bg-surface p-5 deckle">
            <div className="flex items-start justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="grid h-9 w-9 place-items-center rounded-full bg-paper-2 font-display text-[14px] text-ink-2">
                  {m.buyer.replace("Chef ", "").charAt(0)}
                </div>
                <div className="leading-tight">
                  <div className="text-[14px] font-semibold text-ink">{m.buyer}</div>
                  <div className="text-[12px] text-ink-3">{m.account}</div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                {flagged && <Tag tone="terracotta">Contacted {days}d ago</Tag>}
                {isSent ? <Tag tone="olive">Sent</Tag> : <Tag tone="neutral">Ready</Tag>}
              </div>
            </div>

            {proposed && acct && !isSent && <W2Context acct={acct} />}

            {isEditing ? (
              <textarea
                value={texts[i]}
                onChange={(e) => setText(i, e.target.value)}
                rows={4}
                className="mt-3.5 w-full resize-none rounded-lg border hairline bg-cream px-4 py-3 text-[14px] leading-relaxed text-ink focus:outline-none focus:ring-1 focus:ring-olive/40"
              />
            ) : (
              <p className="mt-3.5 rounded-lg bg-paper-2/40 px-4 py-3 text-[14px] leading-relaxed text-ink-2"
                style={{
                  opacity: isRegen ? 0.3 : 1,
                  filter: isRegen ? "blur(2px)" : "blur(0px)",
                  transition: "opacity 200ms var(--ease-out), filter 200ms var(--ease-out)",
                }}>
                {texts[i]}
              </p>
            )}

            {flagged && !dismissed.has(i) && (
              <div data-tour="w2-guardrail" className="mt-3 rounded-lg border border-terracotta/30 bg-terracotta/8 px-3.5 py-2.5">
                <p className="text-[12.5px] leading-relaxed text-terracotta">
                  You reached out to {firstName(m.buyer)} {days} days ago. Another promo this soon is the over-emailing that risks an unsubscribe. Consider skipping this cycle.
                </p>
                <div className="mt-2 flex items-center gap-3.5">
                  <button onClick={() => wf.skipW2(i)}
                    className="text-[12px] font-medium text-terracotta hover:opacity-80">
                    Skip this cycle
                  </button>
                  <button onClick={() => setDismissed((s) => new Set(s).add(i))}
                    className="text-[12px] text-ink-3 hover:text-ink-2">
                    Send anyway
                  </button>
                </div>
              </div>
            )}

            {!isSent && (
              <div className="mt-4 flex items-center justify-end gap-2.5">
                <button onClick={() => setEditingIdx(isEditing ? null : i)}
                  className={"text-[12.5px] " + (isEditing ? "font-medium text-olive-deep" : "text-ink-3 hover:text-ink-2")}>
                  {isEditing ? "Done" : "Edit"}
                </button>
                <button onClick={() => regenerate(i)} disabled={isRegen}
                  className="flex items-center gap-1.5 text-[12.5px] text-ink-3 hover:text-ink-2 disabled:opacity-50">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" className={isRegen ? "animate-spin" : ""}><path d="M3 12a9 9 0 1 1 3 6.7M3 19v-4h4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  {isRegen ? "Regenerating…" : "Regenerate"}
                </button>
                <button onClick={() => sendOne(i)}
                  className="rounded-lg bg-olive px-4 py-1.5 text-[12.5px] font-medium text-cream hover:bg-olive-deep">
                  Send
                </button>
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="reveal mx-auto max-w-[1000px] px-9 py-8">
          {/* Campaign header */}
          <div className="flex flex-wrap items-end justify-between gap-4">
            <div>
              <div className="flex items-center gap-2">
                <Eyebrow>Seasonal campaign</Eyebrow>
                <Tag tone="gold">Active</Tag>
              </div>
              <h2 className="mt-1.5 font-display text-[24px] text-ink">{W2.campaign}</h2>
              <p className="mt-1 text-[13px] text-ink-3">{W2.window}</p>
            </div>
            <div className="text-right">
              <div className="num text-[13px] text-ink-2 tnum">
                <span className="text-ink font-semibold">{reviewed}</span> reviewed · {readyIdx.length} ready
                {proposed && skipped.size > 0 && <span className="text-terracotta"> · {skipped.size} skipped</span>}
              </div>
              <div className="mt-1.5 h-1.5 w-44 overflow-hidden rounded-full bg-paper-2">
                <div className="h-full w-full origin-left rounded-full bg-olive transition-transform duration-500" style={{ transform: "scaleX(" + (reviewed / W2.ready) + ")", transitionTimingFunction: "var(--ease-out)" }} />
              </div>
            </div>
          </div>

          {/* Generated messages */}
          <div className="mt-7">
            <div className="flex items-center justify-between">
              <Eyebrow>Generated outreach · review &amp; send</Eyebrow>
              <div className="flex items-center gap-3">
                <span className="text-[12px] text-ink-3">{W2.messages.length} of {W2.ready} shown</span>
                {proposed && <SortMenu value={sort} options={W2_SORTS} onChange={setSort} />}
              </div>
            </div>

            {readyIdx.length > 0 && (
              <section className="mt-4">
                <Eyebrow>Ready to review ({readyIdx.length})</Eyebrow>
                <div className="mt-3 space-y-3">{pgR.pageItems.map(renderCard)}</div>
                <Pager page={pgR.page} totalPages={pgR.totalPages} total={pgR.total} start={pgR.start} end={pgR.end} onChange={pgR.setPage} label="messages" />
              </section>
            )}
            {sentIdx.length > 0 && (
              <section className="mt-6">
                <Eyebrow>Sent ({sentIdx.length})</Eyebrow>
                <div className="mt-3 space-y-3">{pgS.pageItems.map(renderCard)}</div>
                <Pager page={pgS.page} totalPages={pgS.totalPages} total={pgS.total} start={pgS.start} end={pgS.end} onChange={pgS.setPage} label="messages" />
              </section>
            )}
          </div>

        </div>
      );
    }

    /* ============================================================
       RELATIONSHIP BRIEF, shared engine (W1 reactive + New Workflow proactive)
       ============================================================ */
    function HealthChip({ health }) {
      const h = HEALTH[health];
      return (
        <span className={"inline-flex items-center gap-1.5 rounded-full border px-2.5 py-1 text-[11.5px] font-medium " + h.chip}>
          <span className={"h-1.5 w-1.5 rounded-full " + h.dot} />{h.label}
        </span>
      );
    }

    function SectionLabel({ children, n }) {
      return (
        <div className="mb-2.5 flex items-center gap-2">
          <span className="num grid h-4 w-4 place-items-center rounded-full bg-ink/8 text-[9px] text-ink-2">{n}</span>
          <Eyebrow>{children}</Eyebrow>
        </div>
      );
    }

    function FactRow({ label, children }) {
      return (
        <div className="grid grid-cols-[112px_1fr] gap-3 border-t hairline py-2.5 first:border-0 first:pt-0">
          <div className="eyebrow !text-[9px] pt-1">{label}</div>
          <div className="text-[13.5px] leading-relaxed text-ink-2">{children}</div>
        </div>
      );
    }

    function Pref({ children, kind }) {
      const ok = kind === "liked";
      return (
        <span className={"inline-flex items-center gap-1 rounded-md border px-2 py-0.5 text-[12px] " +
          (ok ? "border-olive/25 bg-olive/8 text-olive-deep" : "border-terracotta/25 bg-terracotta/8 text-terracotta")}>
          <span className="num text-[10px]">{ok ? "✓" : "✕"}</span>{children}
        </span>
      );
    }

    function StockRow({ stock, onEdit = () => () => {}, recommended = [], onPick }) {
      return (
        <div className="flex flex-wrap items-center gap-x-6 gap-y-2 rounded-lg bg-surface/70 px-4 py-3">
          <div className="min-w-0">
            <Eyebrow className="!text-[9px]">Item</Eyebrow>
            <div className="text-[13px] text-ink"><EditableField value={stock.product} onCommit={onEdit("product")} mono={false} /></div>
          </div>
          <div><Eyebrow className="!text-[9px]">SKU</Eyebrow><div className="num text-[12.5px] text-ink"><ProductPicker value={stock.sku} recommended={recommended} onPick={onPick} onPickRaw={onEdit("sku")} /></div></div>
          <div><Eyebrow className="!text-[9px]">Lot</Eyebrow><div className="num text-[12.5px] text-ink"><EditableField value={stock.lot} onCommit={onEdit("lot")} /></div></div>
          <div>
            <Eyebrow className="!text-[9px]">Status</Eyebrow>
            <div className={"text-[12.5px] " + (stock.inStock ? "text-olive-deep" : "text-terracotta")}><EditableField value={stock.status} onCommit={onEdit("status")} mono={false} className={stock.inStock ? "text-olive-deep" : "text-terracotta"} /></div>
          </div>
        </div>
      );
    }

    function Brief({ brief, onSent, done = false }) {
      const [text, setText] = useState("");
      const [sent, setSent] = useState(done);
      const [stock, setStock] = useState(brief.stock);
      const [alts, setAlts] = useState([brief.quickDraft, ...(brief.quickDraftAlts || [])]);
      const [variant, setVariant] = useState(0);
      const [regenerating, setRegenerating] = useState(false);
      const quick = alts[variant];
      const reactive = brief.flavor === "reactive";
      const f = brief.facts;
      const tone = reactive ? TONE[brief.intent.tone] : null;
      const mem = React.useContext(MemoryContext);
      const who = firstName(brief.buyer);

      // What the agent has already learned that applies to THIS brief: every
      // fact remembered for this buyer, plus the AM's voice (which travels with
      // the AM, not the buyer). Shown as the "Applied what you taught me" recall.
      const applied = mem.enabled
        ? mem.memories
            .filter((m) => m.kind === "voice" || (m.kind === "fact" && m.scope === brief.id))
            .sort((a, b) => b.strength - a.strength)
        : [];

      // Editable copy of the stock facts (never mutate the shared brief data).
      // Corrections flow into any drafted reply + the "Just draft it" template,
      // and teach the agent this buyer's preference (CAPTURE).
      const editStock = (key) => (newVal) => {
        const oldVal = stock[key];
        setStock((s) => ({ ...s, [key]: newVal }));
        const apply = (t) => {
          let out = syncValue(t, oldVal, newVal);
          if (key === "lot") out = syncValue(out, bareCode(oldVal), bareCode(newVal));
          return out;
        };
        setText((t) => apply(t));
        setAlts((a) => a.map(apply));
        if (newVal !== oldVal) mem.capture({
          kind: "fact", scope: brief.id, scopeLabel: who,
          id: "fact:" + brief.id + ":" + key,
          label: factLabel(key, newVal), detail: "Was " + oldVal + ", now " + newVal,
          origin: "factEdit",
        });
      };

      // Picking a product from the catalog swaps all stock facts at once and syncs
      // every changed value into the live compose text + alternates. Flipping inStock
      // here also re-resolves the Status color and the substitutions-panel guard.
      // A real swap teaches the agent this buyer's product preference (CAPTURE).
      const pickProduct = (entry) => {
        const next = { ...stock, ...entry };
        const apply = (t) => syncFields(t, stock, next, ["product", "sku", "lot", "status"]);
        setStock(next);
        setText((t) => apply(t));
        setAlts((a) => a.map(apply));
        if (entry.sku !== stock.sku) mem.capture({
          kind: "fact", scope: brief.id, scopeLabel: who,
          id: "fact:" + brief.id + ":sku:" + entry.sku,
          label: "Prefers " + entry.product,
          detail: "Swapped in over the agent's pick",
          origin: "skuSwap",
        });
      };

      // Sending captures HOW the AM writes: compare the agent's draft to what
      // actually went out and remember any stylistic signal (CAPTURE).
      const send = () => {
        if (mem.enabled) classifyVoiceEdit(quick, text).forEach((sig) => mem.capture({
          kind: "voice", scope: "am", scopeLabel: "Your voice",
          id: "voice:" + sig, label: VOICE_LABELS[sig], origin: "toneRewrite",
        }));
        setSent(true);
        if (onSent) onSent(brief.id);
      };

      // The brief's substitutions, resolved to their full catalog records, surface
      // first in the picker as recommended (carrying the rejected/new flag + note).
      const recommended = reactive
        ? (brief.subs || [])
            .map((s) => {
              const entry = SKU_CATALOG.find((e) => e.product === s.name);
              return entry ? { entry, flag: s.flag, note: s.note } : null;
            })
            .filter(Boolean)
        : [];

      // Regenerate cycles to the next alternate draft (brief shimmer, matching W1).
      const regenerate = () => {
        if (regenerating || alts.length < 2) return;
        setRegenerating(true);
        const next = (variant + 1) % alts.length;
        setTimeout(() => { setVariant(next); setText(alts[next]); setRegenerating(false); }, 450);
      };

      return (
        <div key={brief.id} className="fadein overflow-hidden rounded-2xl border hairline bg-cream deckle">
          {/* Brief header */}
          <div className="flex items-start justify-between gap-4 border-b hairline bg-surface-2/40 px-6 py-5">
            <div className="flex items-center gap-3.5">
              <div className="grid h-11 w-11 place-items-center rounded-full bg-paper-2 font-display text-[17px] text-ink-2">
                {firstName(brief.buyer).charAt(0)}
              </div>
              <div>
                <div className="font-display text-[18px] leading-tight text-ink">{brief.buyer}</div>
                <div className="text-[13px] text-ink-2">{brief.account} · <span className="text-ink-3">{brief.region}</span></div>
              </div>
            </div>
            <div className="flex flex-col items-end gap-1.5">
              {reactive
                ? <span className={"inline-flex items-center rounded-full border px-2.5 py-1 text-[11.5px] font-medium " + tone.chip}>{brief.intent.label}</span>
                : <HealthChip health={brief.health} />}
              <div className="eyebrow !text-[9px]">{reactive ? brief.received : "Proactive · no inbound"}</div>
            </div>
          </div>

          <div className="space-y-6 px-6 py-6">
            {/* SECTION 1, Signals */}
            <div>
              <SectionLabel n="1">{reactive ? "Inquiry signals" : "Why now"}</SectionLabel>
              {reactive ? (
                <div className="space-y-3">
                  <p className="rounded-lg border border-line bg-surface/60 px-4 py-3 text-[14px] leading-relaxed text-ink">
                    {brief.inquiry}
                  </p>
                  <StockRow stock={stock} onEdit={editStock} onPick={pickProduct} recommended={recommended} />
                  {!stock.inStock && brief.subs.length > 0 && (
                    <div className="rounded-lg border border-dashed border-line-2 bg-surface/40 px-4 py-3">
                      <Eyebrow className="!text-[9px] mb-2">Substitutions</Eyebrow>
                      <div className="space-y-2">
                        {brief.subs.map((s, i) => (
                          <div key={i} className="flex items-start gap-2.5">
                            <span className={"mt-1.5 h-1.5 w-1.5 shrink-0 rounded-full " + (s.flag === "rejected" ? "bg-terracotta" : "bg-olive")} />
                            <div className="text-[13px]">
                              <span className="font-medium text-ink">{s.name}</span>
                              {s.flag === "rejected" && <span className="ml-2 rounded bg-terracotta/12 px-1.5 py-0.5 text-[10.5px] font-medium text-terracotta">rejected before</span>}
                              <div className={"text-[12.5px] " + (s.flag === "rejected" ? "text-terracotta" : "text-ink-3")}>{s.note}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              ) : (
                <div className="space-y-3">
                  <div className="rounded-lg border px-4 py-3" style={{ borderColor: HEALTH[brief.health].edge + "33", background: HEALTH[brief.health].edge + "0d" }}>
                    <div className="flex items-center gap-2">
                      <Tag tone={TRIGGER_TONE[brief.trigger.type] === "gold" ? "gold" : (TRIGGER_TONE[brief.trigger.type] === "terracotta" ? "neutral" : "olive")}>{brief.trigger.type}</Tag>
                      <span className="text-[13.5px] font-semibold text-ink">{brief.trigger.label}</span>
                    </div>
                    <p className="mt-1.5 text-[13.5px] leading-relaxed text-ink-2">{brief.trigger.why}</p>
                  </div>
                  <p className="px-1 text-[13px] leading-relaxed text-ink-3">{brief.context.note}</p>
                  {brief.context.stockLine && (
                    <div className="flex items-center gap-2 rounded-lg bg-surface/70 px-4 py-2.5">
                      <Eyebrow className="!text-[9px]">In stock</Eyebrow>
                      <span className="num text-[12.5px] text-ink">{brief.context.stockLine}</span>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* SECTION 2, Buyer-relationship facts */}
            <div>
              <SectionLabel n="2">What we know about {firstName(brief.buyer)}</SectionLabel>
              <div className="rounded-xl border hairline bg-surface px-5 py-3">
                <FactRow label="Order pattern">{f.pattern}</FactRow>
                {(f.liked.length > 0 || f.rejected.length > 0) && (
                  <FactRow label="Preferences">
                    <div className="flex flex-wrap gap-1.5">
                      {f.liked.map((x, i) => <Pref key={"l" + i} kind="liked">{x}</Pref>)}
                      {f.rejected.map((x, i) => <Pref key={"r" + i} kind="rejected">{x}</Pref>)}
                    </div>
                  </FactRow>
                )}
                <FactRow label="Last contact">{f.lastContact}</FactRow>
                {f.threads.length > 0 && (
                  <FactRow label="Open threads">
                    {f.threads.map((t, i) => <div key={i} className="flex items-start gap-2"><span className="mt-1.5 h-1 w-1 shrink-0 rounded-full bg-ink-3" />{t}</div>)}
                  </FactRow>
                )}
              </div>
            </div>

            {/* SECTION 3, Optional prompts */}
            {brief.prompts.length > 0 && (
              <div>
                <SectionLabel n="3">Worth considering</SectionLabel>
                <div className="space-y-1.5">
                  {brief.prompts.map((p, i) => (
                    <div key={i} className="flex items-start gap-2.5 text-[13.5px] text-ink-2">
                      <svg className="mt-0.5 shrink-0 text-gold" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                        <path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2Z" strokeLinejoin="round" />
                      </svg>
                      <span>{p}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* SECTION 4, Compose */}
            <div>
              <SectionLabel n="4">{reactive ? "Your reply" : "Your outreach"}</SectionLabel>
              {applied.length > 0 && !sent && (
                <div className="mb-3 rounded-xl border border-olive/30 bg-olive/8 px-4 py-3">
                  <div className="mb-2 flex items-center gap-1.5">
                    <svg className="text-olive-deep" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.39 6.9H22l-6.2 4.5 2.4 7-6.2-4.6L5.8 20l2.4-7L2 8.9h7.61z"/></svg>
                    <Eyebrow>Applied what you taught me</Eyebrow>
                  </div>
                  <div className="space-y-1.5">
                    {applied.slice(0, 3).map((m, i) => (
                      <div key={i} className="flex items-center justify-between gap-3">
                        <span className="text-[12.5px] text-ink-2">{m.label}</span>
                        <ConfidenceBar strength={m.strength} />
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {sent ? (
                <div className="flex items-center gap-3 rounded-xl border border-olive/30 bg-olive/8 px-5 py-4">
                  <span className="grid h-7 w-7 place-items-center rounded-full bg-olive text-cream">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M20 6 9 17l-5-5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                  </span>
                  <div>
                    <div className="text-[13.5px] font-semibold text-ink">Sent to {firstName(brief.buyer)}</div>
                    <div className="text-[12px] text-ink-3">Logged to {brief.account}. <button className="underline hover:text-ink-2" onClick={() => { setSent(false); setText(""); }}>Write another</button></div>
                  </div>
                </div>
              ) : (
                <div className="rounded-xl border-2 border-olive/25 bg-surface/40 p-1.5">
                  <textarea
                    value={text}
                    onChange={(e) => setText(e.target.value)}
                    placeholder={"Write to " + firstName(brief.buyer) + "…"}
                    rows={text ? 7 : 4}
                    style={{ opacity: regenerating ? 0.45 : 1, transition: "opacity 200ms" }}
                    className="w-full resize-none rounded-lg bg-cream px-4 py-3 text-[14.5px] leading-[1.7] text-ink placeholder:text-ink-3/80 focus:outline-none"
                  />
                  <div className="flex items-center justify-between px-2 py-1.5">
                    {text.trim() ? (
                      <div className="flex items-center gap-2">
                        <button onClick={regenerate} disabled={regenerating || alts.length < 2}
                          className="flex items-center gap-1.5 rounded-lg border hairline bg-surface px-3 py-1.5 text-[12.5px] text-ink-2 hover:bg-surface-2 disabled:opacity-50">
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" className={regenerating ? "animate-spin" : ""}><path d="M3 12a9 9 0 1 1 3 6.7M3 19v-4h4" strokeLinecap="round" strokeLinejoin="round" /></svg>
                          {regenerating ? "Regenerating…" : "Regenerate"}
                        </button>
                        <button onClick={() => setText("")} disabled={regenerating}
                          className="flex items-center gap-1.5 rounded-lg px-3 py-1.5 text-[12.5px] text-ink-3 hover:text-ink-2 disabled:opacity-50">
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M18 6 6 18M6 6l12 12" strokeLinecap="round" /></svg>
                          Clear
                        </button>
                      </div>
                    ) : (
                      <button onClick={() => setText(quick)}
                        className="flex items-center gap-1.5 rounded-lg border hairline bg-surface px-3 py-1.5 text-[12.5px] text-ink-2 hover:bg-surface-2">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M3 21v-3.5L16.5 4l3.5 3.5L6.5 21z" strokeLinejoin="round" /></svg>
                        Just draft it
                      </button>
                    )}
                    <button onClick={send} disabled={!text.trim() || regenerating}
                      className={"flex items-center gap-1.5 rounded-lg px-5 py-1.5 text-[13px] font-medium text-cream shadow-sm " + (text.trim() ? "bg-olive hover:bg-olive-deep" : "bg-ink-3/40 cursor-not-allowed")}>
                      Send
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z" strokeLinejoin="round" /></svg>
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       SCREEN B, W1 (proposed): the Relationship Brief
       ============================================================ */
    function QueueChip({ id, active, onClick, done = false }) {
      const b = W1_BRIEFS[id];
      const on = active === id;
      const tone = TONE[b.intent.tone];
      return (
        <button onClick={() => onClick(id)}
          className={"press flex min-w-[230px] items-center gap-3 rounded-xl border px-4 py-3 text-left transition-colors " +
            (on ? "border-olive/40 bg-cream shadow-sm" : "hairline bg-surface/50 hover:bg-surface") + (done ? " opacity-60" : "")}>
          <span className="h-9 w-1 rounded-full" style={{ background: tone.edge }} />
          <div className="min-w-0 flex-1">
            <div className="truncate font-display text-[15px] text-ink">{b.account}</div>
            <div className="truncate text-[12px] text-ink-3">{done ? "Replied" : firstName(b.buyer) + " · " + (b.intent.tone === "complaint" ? "needs care" : "routine")}</div>
          </div>
          {done && (
            <span className="grid h-5 w-5 shrink-0 place-items-center rounded-full bg-olive text-cream">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="M20 6 9 17l-5-5" strokeLinecap="round" strokeLinejoin="round" /></svg>
            </span>
          )}
        </button>
      );
    }

    function W1Proposed({ active, setActive }) {
      const wf = React.useContext(WorkflowContext);
      return (
        <div className="reveal mx-auto max-w-[920px] px-9 py-8">
          <div className="mb-5">
            <Eyebrow>Inbound</Eyebrow>
            <h2 className="mt-1 font-display text-[22px] text-ink">Relationship Brief</h2>
          </div>

          <div className="mb-5 flex gap-3 overflow-x-auto pb-1">
            {W1_QUEUE.map((id) => <QueueChip key={id} id={id} active={active} onClick={setActive} done={wf.w1Done.has(id)} />)}
          </div>

          <div data-tour="w1-brief">
            <Brief key={active} brief={W1_BRIEFS[active]} done={wf.w1Done.has(active)} onSent={wf.doneW1} />
          </div>
        </div>
      );
    }

    /* ============================================================
       SCREEN A, HOME (proposed): attention cockpit
       ============================================================ */
    function SignalCard({ sig, go }) {
      const a = ACCT(sig.acctId);
      const inbound = sig.kind === "inquiry";
      const accent = inbound ? TONE[sig.tone].edge : HEALTH[sig.health].edge;
      return (
        <button onClick={() => go(sig.tab, sig.target)}
          className="group press relative w-full overflow-hidden rounded-xl border hairline bg-surface px-5 py-4 text-left transition-colors hover:bg-cream hover:shadow-sm">
          <span className="absolute left-0 top-0 h-full w-1" style={{ background: accent }} />
          <div className="flex items-center justify-between gap-4 pl-2">
            <div className="flex min-w-0 items-start gap-3.5">
              <span className="mt-0.5 grid h-8 w-8 shrink-0 place-items-center rounded-full" style={{ background: accent + "1A", color: accent }}>
                {inbound ? (
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M3 7l9 6 9-6M3 7v10h18V7M3 7h18" strokeLinejoin="round" /></svg>
                ) : (
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M3 12h3l2-7 4 14 2-7h5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                )}
              </span>
              <div className="min-w-0">
                <div className="flex flex-wrap items-center gap-2">
                  <span className="font-display text-[16px] text-ink">{a.name}</span>
                  {/* workflow label lives in the group header now; cards keep only status pills */}
                  {!inbound && <HealthChip health={sig.health} />}
                  {inbound && sig.tone === "complaint" && <span className="rounded-full bg-terracotta/12 px-2 py-0.5 text-[10px] font-medium text-terracotta">complaint</span>}
                </div>

    /* ============================================================

    function Screen({ view, mode, w1Active, setW1Active, nwActive, setNwActive, go }) {
      // PulseBoard (VP), static, two states
      if (view === "pulse") return mode === "proposed" ? <PulseProposed /> : <PulseCurrent />;
